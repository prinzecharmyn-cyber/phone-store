<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Add Product</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 2rem auto; }
    form { display: flex; flex-direction: column; gap: 1rem; }
    input, textarea, button { padding: 0.8rem; font-size: 1rem; }
    button { background: #1a1a2e; color: white; border: none; cursor: pointer; }
    #status { margin-top: 1rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>📱 Add New Product</h1>

  <div id="auth-section">
    <button id="login-btn">Log in to Admin</button>
    <span id="user-info" class="hidden"></span>
    <button id="logout-btn" class="hidden">Log out</button>
  </div>

  <form id="product-form" class="hidden">
    <label>Product Name</label>
    <input type="text" id="name" required>
    <label>Price (₦)</label>
    <input type="number" id="price" required>
    <label>Description</label>
    <textarea id="description" rows="3"></textarea>
    <label>Image URL</label>
    <input type="url" id="image" placeholder="https://example.com/phone.jpg" required>
    <button type="submit">Add Product</button>
    <p id="status"></p>
  </form>

  <script>
    netlifyIdentity.init();

    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const userInfo = document.getElementById('user-info');
    const form = document.getElementById('product-form');
    const status = document.getElementById('status');

    function updateUI(user) {
      if (user) {
        loginBtn.classList.add('hidden');
        logoutBtn.classList.remove('hidden');
        userInfo.classList.remove('hidden');
        userInfo.textContent = `Logged in as ${user.email}`;
        form.classList.remove('hidden');
      } else {
        loginBtn.classList.remove('hidden');
        logoutBtn.classList.add('hidden');
        userInfo.classList.add('hidden');
        form.classList.add('hidden');
      }
    }

    const currentUser = netlifyIdentity.currentUser();
    updateUI(currentUser);

    netlifyIdentity.on('login', user => updateUI(user));
    netlifyIdentity.on('logout', () => updateUI(null));

    loginBtn.addEventListener('click', () => netlifyIdentity.open('login'));
    logoutBtn.addEventListener('click', () => netlifyIdentity.logout());

    document.getElementById('product-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      status.textContent = 'Adding product...';
      const product = {
        name: document.getElementById('name').value,
        price: document.getElementById('price').value,
        description: document.getElementById('description').value,
        image: document.getElementById('image').value
      };

      try {
        const response = await fetch('/.netlify/functions/add-product', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(product)
        });
        const result = await response.json();
        if (response.ok) {
          status.textContent = '✅ Product added! Site will update in a few seconds.';
          e.target.reset();
        } else {
          status.textContent = `❌ Error: ${result.error}`;
        }
      } catch (err) {
        status.textContent = '❌ Network error. Please try again.';
      }
    });
  </script>
</body>
</html>
